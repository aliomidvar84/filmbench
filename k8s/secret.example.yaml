# Copy to secret.yaml and fill values (do not commit secret.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: filmbench-env
  namespace: filmbench
type: Opaque
stringData:
  DATABASE_URL: postgresql://filmbench:CHANGE_ME@postgres:5432/filmbench
  JWT_SECRET: CHANGE_ME_MIN_32_CHARS
  CORS_ORIGIN: https://filmbench.example.com
  NEXT_PUBLIC_API_URL: https://api.filmbench.example.com
