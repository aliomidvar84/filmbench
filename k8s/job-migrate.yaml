apiVersion: batch/v1
kind: Job
metadata:
  name: filmbench-db-migrate
  namespace: filmbench
spec:
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: filmbench-migrate:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: filmbench-env
          env:
            - name: NODE_ENV
              value: production
