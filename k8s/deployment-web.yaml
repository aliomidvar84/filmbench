apiVersion: apps/v1
kind: Deployment
metadata:
  name: filmbench-web
  namespace: filmbench
spec:
  replicas: 2
  selector:
    matchLabels:
      app: filmbench-web
  template:
    metadata:
      labels:
        app: filmbench-web
    spec:
      containers:
        - name: web
          image: filmbench-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: HOSTNAME
              value: 0.0.0.0
            - name: PORT
              value: "3000"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
