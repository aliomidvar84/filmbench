apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: filmbench
  namespace: filmbench
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  ingressClassName: nginx
  rules:
    - host: filmbench.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: filmbench-web
                port:
                  number: 80
    - host: api.filmbench.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: filmbench-api
                port:
                  number: 4000
