name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: filmbench
          POSTGRES_PASSWORD: filmbench
          POSTGRES_DB: filmbench
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U filmbench -d filmbench"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://filmbench:filmbench@localhost:5432/filmbench
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm install --no-fund --no-audit

      - name: Migrate database
        run: npm run db:migrate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
